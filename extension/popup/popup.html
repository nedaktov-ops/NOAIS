<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOAIS</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="container">
    <header>
      <h1 class="title">NOAIS</h1>
      <p class="subtitle">No Artificial Intelligence Slop</p>
    </header>

    <section class="score-section" aria-labelledby="score-label">
      <p class="section-label" id="score-label">AI-likely score</p>
      <p class="score-value" id="score-value" aria-live="polite" aria-atomic="true">…</p>
      <div class="score-bar" aria-hidden="true">
        <div class="score-bar-fill" id="score-bar-fill"></div>
      </div>
      <p class="word-count" id="word-count"></p>
    </section>

    <section class="scan-section" aria-labelledby="scan-label">
      <p class="section-label" id="scan-label">Hard-coded AI phrases</p>
      <p class="scan-count" id="scan-count" aria-live="polite" aria-atomic="true">…</p>
    </section>

    <section class="site-section" aria-labelledby="site-label">
      <p class="section-label" id="site-label">On this site</p>
      <p class="site-status" id="site-status" aria-live="polite" aria-atomic="true">…</p>
      <p class="site-hostname" id="site-hostname"></p>
    </section>

    <section class="toggle-section" aria-labelledby="toggle-label">
      <label class="switch" for="toggle">
        <input type="checkbox" id="toggle" aria-labelledby="toggle-label">
        <span class="slider" aria-hidden="true"></span>
      </label>
      <span id="toggle-label" class="status" aria-live="polite">Inactive</span>
    </section>

    <footer>
      <p class="version">v0.4.0 · <a href="#" id="open-settings" class="footer-link">Open Settings</a></p>
    </footer>
  </main>
  <script src="../core/settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
